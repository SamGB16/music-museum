name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: music-museum/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: music-museum

      - name: Build
        run: npm run build
        working-directory: music-museum

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: music-museum/out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4